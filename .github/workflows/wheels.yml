name: wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: wheels ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels (cp310/311/312)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # manylinux2014 x86_64 covers the HF Space (cp311); macOS arm64 for dev
          args: --release --out dist --interpreter 3.10 3.11 3.12
          manylinux: "2014"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write   # trusted publishing to PyPI
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
