name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest maturin
          # certified against this pyart version — bump deliberately and re-verify
          pip install "arm_pyart==2.2.0"
      - name: Build + install the extension
        run: maturin develop --release
      - name: Parity tests (oracle + installed pyart)
        run: pytest -q tests/
