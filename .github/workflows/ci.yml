name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest
          # certified against this pyart version — bump deliberately and re-verify.
          # non-fatal: if the wheel/build isn't available the pyart-parity test
          # self-skips; the oracle parity (numpy/scipy only) still gates CI.
          pip install "arm_pyart==2.2.0" || echo "pyart unavailable; that test will skip"
      - name: Build + install the extension
        run: pip install .   # maturin build backend (rust toolchain set up above)
      - name: Parity tests (oracle + installed pyart)
        run: pytest -q tests/
